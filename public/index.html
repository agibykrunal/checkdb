<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Connection Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0e1a;
      color: #e0e6f0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s ease;
    }
    .card:hover { border-color: rgba(99, 102, 241, 0.3); }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #a5b4fc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #a5b4fc;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-success { background: rgba(34,197,94,0.15); color: #4ade80; }
    .status-error { background: rgba(239,68,68,0.15); color: #f87171; }
    .status-loading { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #64748b; font-size: 0.85rem; }
    .info-value { font-weight: 500; font-size: 0.9rem; }

    .table-wrapper { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      background: rgba(99,102,241,0.1);
      color: #a5b4fc;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #cbd5e1;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .table-name {
      font-weight: 600;
      color: #c4b5fd;
      font-size: 0.95rem;
    }
    .table-meta {
      color: #64748b;
      font-size: 0.8rem;
    }
    .table-section { margin-bottom: 1.5rem; }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 1rem;
      color: #fca5a5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none; }

    .pulse {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); }
      50% { box-shadow: 0 0 20px 5px rgba(99,102,241,0.15); }
    }

    .raw-json {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 1rem;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #94a3b8;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗄️ PostgreSQL Connection Tester</h1>
    <p class="subtitle">Test if your Vercel app can reach your Linux PostgreSQL database</p>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="checkHealth()" id="healthBtn">🏥 Health Check</button>
      <button class="btn btn-primary pulse" onclick="testDB()" id="dbBtn">⚡ Test Database</button>
    </div>

    <!-- Health Result -->
    <div id="healthResult" class="card hidden">
      <h2>🏥 Health Check</h2>
      <div id="healthContent"></div>
    </div>

    <!-- Connection Status -->
    <div id="connCard" class="card hidden">
      <h2>🔌 Connection Status</h2>
      <div id="connContent"></div>
    </div>

    <!-- Server Info -->
    <div id="serverCard" class="card hidden">
      <h2>🖥️ Server Info</h2>
      <div id="serverContent"></div>
    </div>

    <!-- Tables -->
    <div id="tablesCard" class="card hidden">
      <h2>📋 Tables & Data</h2>
      <div id="tablesContent"></div>
    </div>

    <!-- Errors -->
    <div id="errorCard" class="card hidden">
      <h2>❌ Errors</h2>
      <div id="errorContent"></div>
    </div>

    <!-- Raw JSON -->
    <div id="rawCard" class="card hidden">
      <h2>📄 Raw Response <button class="btn btn-secondary" style="margin-left:auto;padding:0.3rem 0.6rem;font-size:0.75rem" onclick="toggleRaw()">Toggle</button></h2>
      <div id="rawContent" class="raw-json hidden"></div>
    </div>
  </div>

  <script>
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }

    function toggleRaw() {
      document.getElementById('rawContent').classList.toggle('hidden');
    }

    async function checkHealth() {
      const btn = document.getElementById('healthBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Checking...';
      show('healthResult');

      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        
        document.getElementById('healthContent').innerHTML = `
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="status-badge status-success">✅ ${data.status}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Message</span>
            <span class="info-value">${data.message}</span>
          </div>
          <div class="info-row">
            <span class="info-label">DATABASE_URL</span>
            <span class="info-value">${data.env_check.DATABASE_URL}</span>
          </div>
          <div class="info-row">
            <span class="info-label">DB_SSL</span>
            <span class="info-value">${data.env_check.DB_SSL}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Timestamp</span>
            <span class="info-value">${data.timestamp}</span>
          </div>
        `;
      } catch (err) {
        document.getElementById('healthContent').innerHTML = `
          <div class="error-box">Failed to reach health endpoint: ${err.message}</div>
        `;
      }

      btn.disabled = false;
      btn.innerHTML = '🏥 Health Check';
    }

    async function testDB() {
      const btn = document.getElementById('dbBtn');
      btn.disabled = true;
      btn.classList.remove('pulse');
      btn.innerHTML = '<span class="spinner"></span> Connecting...';

      // Hide previous results
      ['connCard','serverCard','tablesCard','errorCard','rawCard'].forEach(hide);

      try {
        const res = await fetch('/api/test-db');
        const data = await res.json();

        // Connection
        show('connCard');
        const isOk = data.connection && data.connection.includes('✅');
        document.getElementById('connContent').innerHTML = `
          <div class="info-row">
            <span class="info-label">Status</span>
            <span class="status-badge ${isOk ? 'status-success' : 'status-error'}">${data.connection}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Tested At</span>
            <span class="info-value">${data.timestamp}</span>
          </div>
        `;

        // Server
        if (data.serverInfo) {
          show('serverCard');
          document.getElementById('serverContent').innerHTML = `
            <div class="info-row">
              <span class="info-label">Version</span>
              <span class="info-value" style="font-size:0.8rem">${data.serverInfo}</span>
            </div>
          `;
        }

        // Tables
        if (data.tables && data.tables.length > 0) {
          show('tablesCard');
          let html = '';

          for (const table of data.tables) {
            const tData = data.sampleData[table.table_name];
            html += `<div class="table-section">`;
            html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">`;
            html += `<span class="table-name">📁 ${table.table_name}</span>`;
            if (tData && !tData.error) {
              html += `<span class="table-meta">${tData.totalRows} total rows · ${tData.columns.length} columns</span>`;
            }
            html += `</div>`;

            if (tData && tData.error) {
              html += `<div class="error-box">${tData.error}</div>`;
            } else if (tData && tData.sampleRows.length > 0) {
              html += `<div class="table-wrapper"><table><thead><tr>`;
              tData.columns.forEach(col => { html += `<th>${col}</th>`; });
              html += `</tr></thead><tbody>`;
              tData.sampleRows.forEach(row => {
                html += `<tr>`;
                tData.columns.forEach(col => {
                  const val = row[col];
                  const display = val === null ? '<em style="color:#475569">null</em>' : 
                                  typeof val === 'object' ? JSON.stringify(val) : String(val);
                  html += `<td title="${String(val)}">${display}</td>`;
                });
                html += `</tr>`;
              });
              html += `</tbody></table></div>`;
            } else if (tData) {
              html += `<p class="table-meta" style="padding:0.5rem 0">No rows in this table</p>`;
            }
            html += `</div>`;
          }

          document.getElementById('tablesContent').innerHTML = html;
        } else if (data.tables && data.tables.length === 0) {
          show('tablesCard');
          document.getElementById('tablesContent').innerHTML = `
            <p class="table-meta">No tables found in the 'public' schema. Create some tables first!</p>
          `;
        }

        // Errors
        if (data.errors && data.errors.length > 0) {
          show('errorCard');
          document.getElementById('errorContent').innerHTML = data.errors
            .map(e => `<div class="error-box">${e}</div>`).join('');
        }

        // Raw JSON
        show('rawCard');
        document.getElementById('rawContent').textContent = JSON.stringify(data, null, 2);

      } catch (err) {
        show('errorCard');
        document.getElementById('errorContent').innerHTML = `
          <div class="error-box">Failed to reach test-db endpoint:\n${err.message}\n\nMake sure DATABASE_URL is set in Vercel Environment Variables.</div>
        `;
      }

      btn.disabled = false;
      btn.innerHTML = '⚡ Test Database';
    }
  </script>
</body>
</html>
